<svg width="100%" viewBox="0 0 480 380" xmlns="http://www.w3.org/2000/svg" font-family="'Basis Grotesque', 'Helvetica Neue', Helvetica, Arial, sans-serif">

  <!-- ═══ LEFT COLUMN: CUT ═══ -->
  <g transform="translate(30 20)">
    <rect x="0" y="0" width="200" height="310" rx="14"
          fill="#ffffff" stroke="#dfe4e6" stroke-width="1"/>

    <text x="100" y="32" text-anchor="middle"
          font-size="11" font-weight="600" fill="#9eb1b8" letter-spacing="1.5">
      WHAT MOST MEN TRACK
    </text>
    <line x1="20" y1="46" x2="180" y2="46" stroke="#edf0f1" stroke-width="1"/>

    <g font-size="12" fill="#9eb1b8" text-decoration="line-through" opacity="0.55">
      <text x="20" y="84">Bench press max</text>
      <text x="20" y="116">Calorie deficit</text>
      <text x="20" y="148">Supplement stack</text>
    </g>
  </g>

  <!-- ═══ RIGHT COLUMN: KEPT ═══ -->
  <g transform="translate(250 20)">
    <rect x="0" y="0" width="200" height="310" rx="14"
          fill="#253239" stroke="#253239" stroke-width="1"/>

    <text x="100" y="32" text-anchor="middle"
          font-size="11" font-weight="600" fill="#9eb1b8" letter-spacing="1.5">
      WHAT PROTOCOL KEEPS
    </text>
    <line x1="20" y1="46" x2="180" y2="46" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <g transform="translate(0 58)">
      <text x="20" y="16" font-size="13" font-weight="600" fill="#ffffff">Shoulder-to-waist ratio</text>
    </g>
    <line x1="20" y1="90" x2="180" y2="90" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <g transform="translate(0 102)">
      <text x="20" y="16" font-size="13" font-weight="600" fill="#ffffff">Chest-to-waist ratio</text>
    </g>
    <line x1="20" y1="134" x2="180" y2="134" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <g transform="translate(0 146)">
      <text x="20" y="16" font-size="13" font-weight="600" fill="#ffffff">Body composition</text>
    </g>
    <line x1="20" y1="178" x2="180" y2="178" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <g transform="translate(0 190)">
      <text x="20" y="16" font-size="13" font-weight="600" fill="#ffffff">Posture &amp; alignment</text>
    </g>
    <line x1="20" y1="222" x2="180" y2="222" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <line x1="20" y1="248" x2="180" y2="248" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4 3"/>

    <text x="100" y="272" text-anchor="middle"
          font-size="11" font-weight="500" fill="rgba(255,255,255,0.45)">
      + 100 other Attractiveness
    </text>
    <text x="100" y="290" text-anchor="middle"
          font-size="11" font-weight="500" fill="rgba(255,255,255,0.45)">
      Markers
    </text>
  </g>

</svg>
