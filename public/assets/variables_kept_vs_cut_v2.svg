<svg width="100%" viewBox="0 0 480 600" xmlns="http://www.w3.org/2000/svg" font-family="'Basis Grotesque', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <!-- ─── Title ─── -->
  <text x="240" y="48" text-anchor="middle"
        font-family="Kessler, 'Iowan Old Style', 'Palatino Linotype', serif"
        font-size="22" font-weight="400" fill="#253239" letter-spacing="-0.3">
    What we keep. What we cut.
  </text>
  <text x="240" y="74" text-anchor="middle"
        font-size="12" font-weight="400" fill="#7f949b">
    Out of dozens of variables, research points to a few.
  </text>
  <text x="240" y="90" text-anchor="middle"
        font-size="12" font-weight="400" fill="#7f949b">
    The protocol keeps those. The rest is noise.
  </text>

  <!-- ═══ LEFT COLUMN: CUT ═══ -->
  <g transform="translate(30 120)">
    <rect x="0" y="0" width="200" height="400" rx="14"
          fill="#ffffff" stroke="#dfe4e6" stroke-width="1"/>

    <text x="100" y="32" text-anchor="middle"
          font-size="11" font-weight="600" fill="#9eb1b8" letter-spacing="1.5">
      WHAT MOST MEN TRACK
    </text>
    <line x1="20" y1="46" x2="180" y2="46" stroke="#edf0f1" stroke-width="1"/>

    <!-- Crossed-out variables -->
    <g font-size="12" fill="#9eb1b8" text-decoration="line-through" opacity="0.55">
      <text x="20" y="74">Bench press max</text>
      <text x="20" y="96">Arm circumference</text>
      <text x="20" y="118">Calorie deficit</text>
      <text x="20" y="140">Protein grams per kg</text>
      <text x="20" y="162">Macro split ratio</text>
      <text x="20" y="184">Meal timing window</text>
      <text x="20" y="206">Supplement stack</text>
      <text x="20" y="228">Cardio minutes</text>
      <text x="20" y="250">Training split (PPL, 5x5)</text>
      <text x="20" y="272">Weekly training volume</text>
      <text x="20" y="294">Rep ranges per exercise</text>
      <text x="20" y="316">Rest intervals</text>
      <text x="20" y="338">Deload weeks</text>
      <text x="20" y="360">Creatine timing</text>
      <text x="20" y="382">Step count</text>
    </g>
  </g>

  <!-- ═══ RIGHT COLUMN: KEPT ═══ -->
  <g transform="translate(250 120)">
    <rect x="0" y="0" width="200" height="400" rx="14"
          fill="#253239" stroke="#253239" stroke-width="1"/>

    <text x="100" y="32" text-anchor="middle"
          font-size="11" font-weight="600" fill="#9eb1b8" letter-spacing="1.5">
      WHAT PROTOCOL KEEPS
    </text>
    <line x1="20" y1="46" x2="180" y2="46" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Variable 1: SWR -->
    <g transform="translate(0 60)">
      <text x="20" y="16"
            font-size="13" font-weight="600" fill="#ffffff">
        Shoulder-to-waist ratio
      </text>
      <text x="20" y="32"
            font-size="11" font-weight="400" fill="rgba(255,255,255,0.55)">
        The #1 predictor of perception
      </text>
    </g>
    <line x1="20" y1="108" x2="180" y2="108" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Variable 2: CWR -->
    <g transform="translate(0 120)">
      <text x="20" y="16"
            font-size="13" font-weight="600" fill="#ffffff">
        Chest-to-waist ratio
      </text>
      <text x="20" y="32"
            font-size="11" font-weight="400" fill="rgba(255,255,255,0.55)">
        Defines upper-body silhouette
      </text>
    </g>
    <line x1="20" y1="168" x2="180" y2="168" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Variable 3: Body composition -->
    <g transform="translate(0 180)">
      <text x="20" y="16"
            font-size="13" font-weight="600" fill="#ffffff">
        Body composition
      </text>
      <text x="20" y="32"
            font-size="11" font-weight="400" fill="rgba(255,255,255,0.55)">
        Calibrated to your profile
      </text>
    </g>
    <line x1="20" y1="228" x2="180" y2="228" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Variable 4: Posture -->
    <g transform="translate(0 240)">
      <text x="20" y="16"
            font-size="13" font-weight="600" fill="#ffffff">
        Posture &amp; alignment
      </text>
      <text x="20" y="32"
            font-size="11" font-weight="400" fill="rgba(255,255,255,0.55)">
        How your frame carries itself
      </text>
    </g>

    <!-- Bottom note -->
    <text x="100" y="345" text-anchor="middle"
          font-size="10" font-weight="500" fill="rgba(255,255,255,0.45)" letter-spacing="0.6">
      + CONTEXT VARIABLES
    </text>
    <text x="100" y="365" text-anchor="middle"
          font-size="10" font-weight="400" fill="rgba(255,255,255,0.35)">
      face · age · frame · environment
    </text>
  </g>

  <!-- ─── Bottom caption ─── -->
  <text x="240" y="555" text-anchor="middle"
        font-size="12" font-weight="400" fill="#515255" font-style="italic">
    Fewer variables. Measured. Specific to you.
  </text>
  <text x="240" y="574" text-anchor="middle"
        font-size="12" font-weight="400" fill="#515255" font-style="italic">
    Everything else is cut.
  </text>
</svg>
