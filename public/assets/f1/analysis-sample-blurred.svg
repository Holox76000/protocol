<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" style="background:#f0f4f5">
  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="blur-heavy">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Header -->
  <rect x="0" y="0" width="600" height="56" fill="#253239"/>
  <rect x="20" y="18" width="80" height="20" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="440" y="18" width="140" height="20" rx="4" fill="rgba(255,255,255,0.12)"/>

  <!-- Body silhouette area -->
  <rect x="20" y="72" width="220" height="360" rx="12" fill="#e8edef"/>
  <!-- Silhouette shape (blurred) -->
  <ellipse cx="130" cy="112" rx="28" ry="32" fill="#b8c9ce" filter="url(#blur)"/>
  <path d="M80 145 Q72 215 80 280 Q110 296 130 296 Q150 296 180 280 Q188 215 180 145 Q160 136 130 136 Q100 136 80 145Z" fill="#b8c9ce" filter="url(#blur)"/>
  <path d="M100 292 Q92 350 90 420 Q102 428 114 420 Q120 356 126 298Z" fill="#b8c9ce" filter="url(#blur)"/>
  <path d="M160 292 Q168 350 170 420 Q158 428 146 420 Q140 356 134 298Z" fill="#b8c9ce" filter="url(#blur)"/>

  <!-- Measurement lines (blurred/redacted) -->
  <line x1="20" y1="150" x2="80" y2="150" stroke="#7f949b" strokeWidth="1" opacity="0.6"/>
  <line x1="180" y1="150" x2="240" y2="150" stroke="#7f949b" strokeWidth="1" opacity="0.6"/>
  <line x1="20" y1="200" x2="80" y2="200" stroke="#7f949b" strokeWidth="1" opacity="0.6"/>
  <line x1="180" y1="200" x2="240" y2="200" stroke="#7f949b" strokeWidth="1" opacity="0.6"/>
  <line x1="20" y1="260" x2="80" y2="260" stroke="#7f949b" strokeWidth="1" opacity="0.6"/>
  <line x1="180" y1="260" x2="240" y2="260" stroke="#7f949b" strokeWidth="1" opacity="0.6"/>

  <!-- Right panel: metrics -->
  <rect x="256" y="72" width="324" height="86" rx="10" fill="#fff" opacity="0.9"/>
  <rect x="276" y="90" width="100" height="14" rx="3" fill="#dde3e6" filter="url(#blur-heavy)"/>
  <rect x="276" y="112" width="60" height="28" rx="4" fill="#253239" opacity="0.15" filter="url(#blur-heavy)"/>
  <rect x="356" y="112" width="180" height="14" rx="3" fill="#dde3e6" filter="url(#blur-heavy)"/>
  <rect x="356" y="132" width="140" height="10" rx="3" fill="#eef2f3" filter="url(#blur-heavy)"/>

  <rect x="256" y="170" width="324" height="86" rx="10" fill="#fff" opacity="0.9"/>
  <rect x="276" y="188" width="100" height="14" rx="3" fill="#dde3e6" filter="url(#blur-heavy)"/>
  <rect x="276" y="210" width="60" height="28" rx="4" fill="#3D5A3E" opacity="0.15" filter="url(#blur-heavy)"/>
  <rect x="356" y="210" width="180" height="14" rx="3" fill="#dde3e6" filter="url(#blur-heavy)"/>
  <rect x="356" y="230" width="140" height="10" rx="3" fill="#eef2f3" filter="url(#blur-heavy)"/>

  <rect x="256" y="268" width="324" height="86" rx="10" fill="#fff" opacity="0.9"/>
  <rect x="276" y="286" width="100" height="14" rx="3" fill="#dde3e6" filter="url(#blur-heavy)"/>
  <rect x="276" y="308" width="60" height="28" rx="4" fill="#253239" opacity="0.15" filter="url(#blur-heavy)"/>
  <rect x="356" y="308" width="180" height="14" rx="3" fill="#dde3e6" filter="url(#blur-heavy)"/>
  <rect x="356" y="328" width="140" height="10" rx="3" fill="#eef2f3" filter="url(#blur-heavy)"/>

  <!-- Score section -->
  <rect x="20" y="448" width="560" height="120" rx="12" fill="#253239"/>
  <rect x="40" y="468" width="140" height="16" rx="4" fill="rgba(255,255,255,0.15)" filter="url(#blur-heavy)"/>
  <rect x="40" y="494" width="80" height="44" rx="8" fill="rgba(255,255,255,0.08)" filter="url(#blur-heavy)"/>
  <rect x="140" y="494" width="220" height="16" rx="4" fill="rgba(255,255,255,0.1)" filter="url(#blur-heavy)"/>
  <rect x="140" y="520" width="160" height="12" rx="3" fill="rgba(255,255,255,0.07)" filter="url(#blur-heavy)"/>

  <!-- Protocol preview (heavily blurred) -->
  <rect x="20" y="588" width="560" height="192" rx="12" fill="#fff" opacity="0.9"/>
  <rect x="40" y="608" width="180" height="16" rx="4" fill="#dde3e6" filter="url(#blur-heavy)"/>
  <rect x="40" y="636" width="520" height="10" rx="3" fill="#eef2f3" filter="url(#blur-heavy)"/>
  <rect x="40" y="656" width="480" height="10" rx="3" fill="#eef2f3" filter="url(#blur-heavy)"/>
  <rect x="40" y="676" width="500" height="10" rx="3" fill="#eef2f3" filter="url(#blur-heavy)"/>
  <rect x="40" y="696" width="460" height="10" rx="3" fill="#eef2f3" filter="url(#blur-heavy)"/>
  <rect x="40" y="716" width="520" height="10" rx="3" fill="#eef2f3" filter="url(#blur-heavy)"/>
  <rect x="40" y="736" width="300" height="10" rx="3" fill="#eef2f3" filter="url(#blur-heavy)"/>

  <!-- "Sample — blurred for privacy" watermark -->
  <text x="300" y="790" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9eb1b8" letter-spacing="0.15em" font-weight="500" text-transform="uppercase">SAMPLE — CONTENTS BLURRED</text>
</svg>
